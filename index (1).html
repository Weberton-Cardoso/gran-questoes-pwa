<script src="app.js"></script>
<script>
  // Liga o botão de sincronização da sidebar ao cloud-sync.js
  (function () {
    const btn = document.getElementById('conta-btn');
    const label = document.getElementById('conta-btn-label');

    cloudSync.init((user) => {
      if (user) {
        label.textContent = user.displayName ? `${user.displayName.split(' ')[0]} (sair)` : 'Sair';
        btn.title = `Conectado como ${user.email}. Clique para sair.`;
      } else {
        label.textContent = 'Sincronizar';
        btn.title = 'Entrar com Google para sincronizar entre dispositivos';
      }
    });

    btn.addEventListener('click', () => {
      if (cloudSync.usuarioAtual) {
        cloudSync.sair();
      } else {
        cloudSync.entrarComGoogle();
      }
    });
  })();
</script>
